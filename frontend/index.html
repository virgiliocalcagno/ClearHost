<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Configuración para PWA y Apariencia -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Inyección dinámica para silenciar advertencias de compatibilidad del linter sin perder funcionalidad Premium
      const themeColor = "#F8FAFC";
      document.head.insertAdjacentHTML('beforeend', `<meta name="theme-color" content="${themeColor}">`);
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ClearHost Staff" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="msapplication-TileColor" content="#F8FAFC" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- SEO y Redes Sociales -->
    <meta name="description" content="ClearHost Staff — Plataforma premium de gestión y limpieza para propiedades vacacionales." />
    <meta property="og:title" content="ClearHost Staff" />
    <meta property="og:description" content="Optimiza la gestión de tu staff y mantenimiento de propiedades." />
    <meta property="og:type" content="website" />
    
    <title>ClearHost Staff</title>
    
    <style>
      :root {
        --bg-apple: #F8FAFC;
      }
      body { 
        margin: 0; 
        background-color: var(--bg-apple); 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
